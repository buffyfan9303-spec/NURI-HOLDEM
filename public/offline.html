<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0C0F" />
    <title>오프라인 · NURI HOLDEM</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0A0C0F; color: #EAECEF;
        font-family: 'Pretendard Variable', 'Pretendard', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 24px; gap: 14px; }
      .logo { width: 72px; height: 72px; opacity: .9; }
      h1 { font-size: 20px; font-weight: 800; margin: 4px 0 0; letter-spacing: -.01em; }
      p { font-size: 14px; line-height: 1.6; color: #848E9C; margin: 0; max-width: 280px; word-break: keep-all; }
      button { margin-top: 8px; border: 0; border-radius: 10px; background: #FCD535; color: #181A20;
        font-size: 15px; font-weight: 800; padding: 12px 22px; cursor: pointer; }
      button:active { opacity: .8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="/icon-192.png" alt="NURI HOLDEM" />
      <h1>인터넷 연결이 끊겼어요</h1>
      <p>네트워크를 확인한 뒤 다시 시도해 주세요. 연결되면 바로 이어집니다.</p>
      <button onclick="location.reload()">다시 시도</button>
    </div>
    <script>
      // 온라인 복귀 시 자동 새로고침
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
